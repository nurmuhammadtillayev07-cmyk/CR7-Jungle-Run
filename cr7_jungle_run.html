const Sound = {
  soundOn: true, musicOn: true, musicNodes: null,
  toggleSound(){ this.soundOn = !this.soundOn; },
  toggleMusic(){ this.musicOn = !this.musicOn; if(this.musicOn) this.playMusic(); else this.stopMusic(); },
  tone(freq, dur, vol, wave){
    if(!this.soundOn || !audioCtx) return;
    const t0 = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = wave || 'sine';
    osc.frequency.setValueAtTime(freq, t0);
    gain.gain.setValueAtTime(vol, t0);
    gain.gain.linearRampToValueAtTime(0, t0 + dur);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(t0); osc.stop(t0 + dur);
  },
  chirp(f0, f1, dur, vol){
    if(!this.soundOn || !audioCtx) return;
    const t0 = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(f0, t0);
    osc.frequency.linearRampToValueAtTime(f1, t0 + dur);
    gain.gain.setValueAtTime(vol, t0);
    gain.gain.linearRampToValueAtTime(0, t0 + dur);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(t0); osc.stop(t0 + dur);
  },
  noise(dur, vol){
    if(!this.soundOn || !audioCtx) return;
    const bufferSize = audioCtx.sampleRate * dur;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for(let i=0;i<bufferSize;i++) data[i] = (Math.random()*2-1) * (1 - i/bufferSize);
    const src = audioCtx.createBufferSource();
    src.buffer = buffer;
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    src.connect(gain).connect(audioCtx.destination);
    src.start();
  },
  play(name){
    if(!audioCtx) return;
    switch(name){
      case 'jump': this.chirp(350,750,0.16,0.25); break;
      case 'coin': this.tone(1300,0.12,0.25,'sine'); break;
      case 'hit': this.noise(0.18,0.3); break;
      case 'button': this.tone(700,0.05,0.18,'square'); break;
      case 'powerup': this.chirp(400,1000,0.25,0.25); break;
      case 'levelup': this.chirp(500,1100,0.35,0.3); break;
      case 'ball': this.tone(900,0.1,0.2,'sine'); break;
    }
  },
  playMusic(){
    if(!audioCtx || !this.musicOn || this.musicNodes) return;
    const freqs = [130.81, 164.81, 196.00];
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
    gain.connect(audioCtx.destination);
    const oscs = freqs.map(f=>{
      const o = audioCtx.createOscillator();
      o.type = 'sine'; o.frequency.setValueAtTime(f, audioCtx.currentTime);
      o.connect(gain); o.start();
      return o;
    });
    this.musicNodes = {oscs, gain};
  },
  stopMusic(){
    if(this.musicNodes){
      this.musicNodes.oscs.forEach(o=>{ try{o.stop();}catch(e){} });
      this.musicNodes = null;
    }
  }
};

class Player {
  constructor(){
    this.x = 200; this.groundY = GROUND_Y;
    this.width = 44; this.height = 80; this.baseHeight = 80;
    this.y = this.groundY - this.height;
    this.vy = 0; this.gravity = 0.55; this.jumpStrength = -14;
    this.isJumping = false; this.isDucking = false;
    this.frameTimer = 0; this.runFrame = 0; this.squash = 1.0;
    this.runIndex = 0; this.runTimer = 0;
    this.duckIndex = 0; this.duckTimer = 0;
  }
  jump(){
    if(!this.isJumping && !this.isDucking){
      this.isJumping = true; this.vy = this.jumpStrength; this.squash = 1.15;
      Sound.play('jump');
    }
  }
  duck(state){
    this.isDucking = state;
    if(state && !this.isJumping){ this.height = 45; this.y = this.groundY - this.height; }
    else if(!state && !this.isJumping){ this.height = this.baseHeight; this.y = this.groundY - this.height; }
  }
  update(){
    let landed = false;
    if(this.isJumping){
      this.vy += this.gravity; this.y += this.vy;
      if(this.y >= this.groundY - this.height){
        this.y = this.groundY - this.height; this.isJumping = false; this.vy = 0;
        this.squash = 0.8; landed = true;
      }
    }
    if(this.squash < 1.0) this.squash = Math.min(1.0, this.squash + 0.025);
    else if(this.squash > 1.0) this.squash = Math.max(1.0, this.squash - 0.025);
    this.frameTimer++;
    if(this.frameTimer % 5 === 0) this.runFrame = (this.runFrame + 1) % 4;

    if(!this.isJumping){
      if(this.isDucking){
        this.duckTimer++;
        if(this.duckTimer % 4 === 0) this.duckIndex = (this.duckIndex + 1) % SPRITE_COLS;
      } else {
        this.runTimer++;
        if(this.runTimer % 4 === 0) this.runIndex = (this.runIndex + 1) % SPRITE_COLS;
      }
    }
    return landed;
  }
  draw(invuln, frameCount){
    if(invuln && Math.floor(frameCount/4) % 2 === 0) return;
    if(spriteLoaded){ this.drawSprite(); return; }
    this.drawFallback();
  }
  drawSprite(){
    let row, col, squashH = 1.0, squashW = 1.0;
    if(this.isJumping){
      row = 1;
      const jmin = this.jumpStrength, jmax = 14.0;
      let t = (this.vy - jmin) / (jmax - jmin);
      t = Math.max(0, Math.min(1, t));
      col = Math.floor(t * (SPRITE_COLS - 1));
    } else if(this.isDucking){
      row = 0; col = this.duckIndex;
      squashH = 0.62; squashW = 1.25;
    } else {
      row = 0; col = this.runIndex;
    }
    const box = spriteBox(row, col);
    const sx = col * SPRITE_CELL_W + box.x;
    const sy = row * SPRITE_CELL_H + box.y;
    const dw = box.w * SPRITE_DISPLAY_SCALE * squashW;
    const dh = box.h * SPRITE_DISPLAY_SCALE * squashH;
    const feetY = this.y + this.height;
    const cx = this.x + this.width/2;
    const dx = cx - dw/2;
    const dy = feetY - dh;
    ctx.drawImage(playerSheet, sx, sy, box.w, box.h, dx, dy, dw, dh);
  }
  drawFallback(){
    const cx = this.x + this.width/2;
    let bob = 0;
    if(!this.isJumping && !this.isDucking) bob = -Math.abs(Math.sin(this.runFrame*Math.PI/2))*3;
    const cy = this.y + bob;
    let legOff = (this.runFrame % 2 === 0) ? 6 : -6;
    let armOff = -legOff;
    if(this.isJumping){ legOff = 4; armOff = -8; }

    if(this.isDucking && !this.isJumping){
      circle(cx+12, cy+12, 10, COLORS.skin);
      circle(cx+14, cy+8, 8, COLORS.black);
      rect(cx-20, cy+16, 32, 18, COLORS.red);
      rect(cx-20, cy+34, 32, 10, COLORS.green);
      rect(cx-15, cy+44, 12, 6, COLORS.white);
      rect(cx+2, cy+44, 12, 6, COLORS.white);
      textCtr('7', cx-2, cy+22, 16, COLORS.yellow);
    } else {
      line(cx-18, cy+28, cx-18+armOff, cy+45, 5, COLORS.skin);
      line(cx+18, cy+28, cx+18-armOff, cy+45, 5, COLORS.skin);
      circle(cx, cy+12, 11, COLORS.skin);
      circle(cx, cy+6, 9, COLORS.black);
      rect(cx-18, cy+23, 36, 30, COLORS.red);
      rect(cx-18, cy+53, 36, 18, COLORS.green);
      rect(cx-16, cy+71+legOff, 12, 9, COLORS.white);
      rect(cx+4, cy+71-legOff, 12, 9, COLORS.white);
      textCtr('7', cx, cy+35, 22, COLORS.yellow);
    }
  }
  get rect(){ return {x:this.x+4, y:this.y, w:this.width-8, h:this.height}; }
}

class FootBall {

class Particle {
  constructor(x,y,vx,vy,color,life,size,gravity){
    this.x=x; this.y=y; this.vx=vx; this.vy=vy; this.color=color;
    this.life=life; this.maxLife=life; this.size=size||3; this.gravity=gravity||0;
  }
  update(){ this.x+=this.vx; this.y+=this.vy; this.vy+=this.gravity; this.life--; }
  draw(){
    if(this.life<=0) return;
    const ratio = Math.max(0, this.life/this.maxLife);
    const alpha = Math.max(0, Math.min(1, ratio));
    const s = Math.max(1, Math.round(this.size*ratio)+1);
    ctx.globalAlpha = alpha;
    circle(this.x, this.y, s, this.color);
    ctx.globalAlpha = 1;
  }
  get alive(){ return this.life > 0; }
}

class RainDrop {

  }
  draw(){ line(this.x, this.y, this.x-4, this.y+this.length, 2, '#b4c8ff'); }
}

class ParallaxTree {
  constructor(x, layer){
    this.x = x; this.layer = layer;
    this.speedFactor = layer===1 ? 0.4 : 1.2;
    this.color = layer===1 ? '#285028' : '#1e411e';
    this.height = layer===1 ? randInt(140,210) : randInt(100,150);
    this.y = GROUND_Y - this.height;
  }
  update(baseSpeed){
    this.x -= baseSpeed*0.25*this.speedFactor;
    if(this.x < -80){
      this.x = VW + randInt(10,150);
      this.height = this.layer===1 ? randInt(140,210) : randInt(100,150);
      this.y = GROUND_Y - this.height;
    }
  }
  draw(){
    rect(this.x+18, this.y+this.height-40, 8, 40, '#462814');
    polygon([[this.x-10,this.y+this.height-30],[this.x+22,this.y],[this.x+54,this.y+this.height-30]], this.color);
  }
}

function rect(x,y,w,h,color){ ctx.fillStyle=color; ctx.fillRect(x,y,w,h); }
function strokeRect(x,y,w,h,lw,color){ ctx.strokeStyle=color; ctx.lineWidth=lw; ctx.strokeRect(x,y,w,h); }
function circle(x,y,r,color){ ctx.fillStyle=color; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill(); }
function strokeCircle(x,y,r,lw,color){ ctx.strokeStyle=color; ctx.lineWidth=lw; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.stroke(); }
function line(x1,y1,x2,y2,lw,color){ ctx.strokeStyle=color; ctx.lineWidth=lw; ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke(); }
function polygon(points, color){ ctx.fillStyle=color; ctx.beginPath(); ctx.moveTo(points[0][0],points[0][1]); for(let i=1;i<points.length;i++) ctx.lineTo(points[i][0],points[i][1]); ctx.closePath(); ctx.fill(); }
function textCtr(text, cx, cy, size, color, weight){
  ctx.fillStyle = color; ctx.font = (weight||'bold')+' '+size+'px Arial';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(text, cx, cy);
}
function textLeft(text, x, y, size, color){
  ctx.fillStyle = color; ctx.font='bold '+size+'px Arial';
  ctx.textAlign='left'; ctx.textBaseline='middle';
  ctx.fillText(text, x, y);
}
function drawButton(r, text, bg, fg){
  roundRect(r.x, r.y, r.w, r.h, 12, bg);
  strokeRoundRect(r.x, r.y, r.w, r.h, 12, 2, COLORS.white);
  textCtr(text, r.x+r.w/2, r.y+r.h/2, 22, fg);
}
function roundRect(x,y,w,h,rad,color){
  ctx.fillStyle=color;
  ctx.beginPath();
  ctx.moveTo(x+rad,y);
  ctx.arcTo(x+w,y,x+w,y+h,rad);
  ctx.arcTo(x+w,y+h,x,y+h,rad);
  ctx.arcTo(x,y+h,x,y,rad);
  ctx.arcTo(x,y,x+w,y,rad);
  ctx.closePath(); ctx.fill();
}
function strokeRoundRect(x,y,w,h,rad,lw,color){
  ctx.strokeStyle=color; ctx.lineWidth=lw;
  ctx.beginPath();
  ctx.moveTo(x+rad,y);
  ctx.arcTo(x+w,y,x+w,y+h,rad);
  ctx.arcTo(x+w,y+h,x,y+h,rad);
  ctx.arcTo(x,y+h,x,y,rad);
  ctx.arcTo(x,y,x+w,y,rad);
  ctx.closePath(); ctx.stroke();
}
function drawHeart(x,y,size,filled){
  const color = filled ? COLORS.red : COLORS.darkGray;
  const r = size/2;
  circle(x-r/2, y, r/2+1, color);
  circle(x+r/2, y, r/2+1, color);
  polygon([[x-size/2-1,y+1],[x+size/2+1,y+1],[x,y+size/2+2]], color);
}
function drawGround(offset){
  rect(0, GROUND_Y, VW, VH-GROUND_Y, COLORS.groundColor);
  rect(0, GROUND_Y, VW, 10, COLORS.green);
  const step = 20; const shift = Math.floor(offset % step);

function buildGradientSky(top, bottom, height){
  const off = document.createElement('canvas'); off.width=VW; off.height=height;
  const c = off.getContext('2d');
  const grad = c.createLinearGradient(0,0,0,height);
  grad.addColorStop(0, `rgb(${top[0]},${top[1]},${top[2]})`);
  grad.addColorStop(1, `rgb(${bottom[0]},${bottom[1]},${bottom[2]})`);
  c.fillStyle = grad; c.fillRect(0,0,VW,height);
  return off;
}
function spawnBurst(particles, x, y, color, count, mult){

  for(let i=0;i<n;i++){

    particles.push(new Particle(x,y, Math.cos(ang)*spd, Math.sin(ang)*spd, color, randInt(18,32), 4, 0.15));

function spawnDust(particles, x, y, mult){

function colorStr(c){ return Array.isArray(c) ? `rgb(${c[0]},${c[1]},${c[2]})` : c; }

    if(pointIn(soundToggleBtn, pos)){ Sound.toggleSound(); saveData.sound_on=Sound.soundOn; Sound.play('button'); }
    else if(pointIn(musicToggleBtn, pos)){ Sound.toggleMusic(); saveData.music_on=Sound.musicOn; Sound.play('button'); }
    else if(pointIn(graphicsToggleBtn, pos)){ graphicsQuality = graphicsQuality==='high'?'low':'high'; saveData.graphics=graphicsQuality; Sound.play('button'); }
    else if(pointIn(backBtn, pos)){ Sound.play('button'); state=prevState; }
  } else if(state === 'gameover'){
    if(pointIn(gameoverRestartBtn, pos)){ Sound.play('button'); game=resetGameState(); state='playing'; Sound.playMusic(); }
  }
}
function handleUp(pos){
  if(state==='playing'){
    if(pointIn(duckBtn, pos)) game.player.duck(false);
  }
}

canvas.addEventListener('pointerdown', e=>{ e.preventDefault(); const pos=getVirtualPos(e.clientX,e.clientY); handleDown(pos); lastDuckHeld = pointIn(duckBtn,pos); });
canvas.addEventListener('pointerup', e=>{ e.preventDefault(); const pos=getVirtualPos(e.clientX,e.clientY); handleUp(pos); lastDuckHeld=false; });
canvas.addEventListener('pointercancel', e=>{ if(state==='playing') game.player.duck(false); lastDuckHeld=false; });
let lastDuckHeld = false;

document.addEventListener('keydown', e=>{
  ensureAudio();
  if(e.code === 'Escape'){
    if(state==='playing') state='paused';
    else if(state==='paused') state='playing';
  } else if(['Space','ArrowUp','KeyW'].includes(e.code)){
    e.preventDefault();
    if(state==='playing') game.player.jump();
    else if(state==='menu'){ state='playing'; game=resetGameState(); Sound.playMusic(); }
  } else if(['ArrowDown','KeyS'].includes(e.code)){
    if(state==='playing') game.player.duck(true);
  }
});
document.addEventListener('keyup', e=>{
  if(['ArrowDown','KeyS'].includes(e.code)){
    if(state==='playing') game.player.duck(false);
  }
});

// ================= YANGILANISH =================
function update(){
  frameCount++;
  const quality = QUALITY[graphicsQuality];

  if(state === 'playing'){
    const landed = game.player.update();
    if(landed){ game.shakeTimer=6; game.shakeMag=4; }
    for(const t of trees) t.update(game.speed);
    game.groundOffset += game.speed;
    game.dayTimer++;

    game.rainToggleTimer--;
    if(game.rainToggleTimer <= 0){
      game.raining = game.level >= 2 ? !game.raining : false;
      game.rainToggleTimer = randInt(500,1000);
    }

    game.spawnTimer++;
    if(game.spawnTimer >= game.nextSpawn){
      game.obstacles.push(new Obstacle(game.speed));
      game.spawnTimer = 0; game.nextSpawn = randInt(60,100);
    }

    for(const obs of game.obstacles){
      obs.update();
      if(!obs.passed && obs.x+obs.width < game.player.x){
        obs.passed = true; game.score++;
        if(game.score > highScore) highScore = game.score;
        const newLevel = 1 + Math.floor(game.score/10);
        if(newLevel > game.level){
          game.level = newLevel; game.baseSpeed += 0.4;
          game.levelMsgTimer = 90; Sound.play('levelup');
        }
      }
    }

    if(game.invulnTimer <= 0){
      for(const obs of game.obstacles){
        if(rectsCollide(game.player.rect, obs.rect)){
          const cx = game.player.x+game.player.width/2, cy = game.player.y+game.player.height/2;
          if(game.shieldActive){
            game.shieldActive=false; game.shieldTimer=0;
            spawnBurst(game.particles, cx, cy, [70,130,220], 14, quality.particleMult);
            Sound.play('hit'); game.invulnTimer=40; game.shakeTimer=8; game.shakeMag=6;
          } else {
            game.lives--;
            spawnBurst(game.particles, cx, cy, [220,20,60], 16, quality.particleMult);
            Sound.play('hit'); game.invulnTimer=90; game.shakeTimer=18; game.shakeMag=10;
            if(game.lives <= 0){
              totalCoins += game.coinCount;
              saveData.total_coins = totalCoins;
              if(game.score > saveData.high_score) saveData.high_score = game.score;
              state = 'gameover'; Sound.stopMusic();
              break;
            }
          }
        }
      }
    }
    game.obstacles = game.obstacles.filter(o=>o.x+o.width>0);
    if(game.invulnTimer>0) game.invulnTimer--;

    game.coinSpawnTimer++;
    if(game.coinSpawnTimer > 55 && randInt(1,100) <= 3){
      game.coins.push(new Coin(game.speed)); game.coinSpawnTimer=0;
    }
    for(const coin of game.coins){
      coin.update();
      if(rectsCollide(game.player.rect, coin.rect)){
        game.coinCount++; coin.collected=true;
        spawnBurst(game.particles, coin.x, coin.y, [255,195,0], 10, quality.particleMult);
        Sound.play('coin');
      }
    }
    game.coins = game.coins.filter(c=>c.x>-50 && !c.collected);

    game.ballSpawnTimer++;
    if(game.ballSpawnTimer > 300 && randInt(1,400)===1){
      game.balls.push(new FootBall(game.speed)); game.ballSpawnTimer=0;
    }
    for(const ball of game.balls){
      ball.update();
      if(rectsCollide(game.player.rect, ball.rect)){
        ball.collected=true; game.score += 5;
        spawnBurst(game.particles, ball.x, ball.y, [255,255,255], 10, quality.particleMult);
        Sound.play('ball');
      }
    }
    game.balls = game.balls.filter(b=>b.x>-50 && !b.collected);

    game.powerupSpawnTimer++;
    if(game.powerupSpawnTimer > 500 && randInt(1,600)===1){
      game.powerups.push(new PowerUp(game.speed, choice(['shield','speed'])));
      game.powerupSpawnTimer = 0;
    }
    for(const p of game.powerups){
      p.update();
      if(rectsCollide(game.player.rect, p.rect)){
        p.collected=true; Sound.play('powerup');
        if(p.kind==='shield'){ game.shieldActive=true; game.shieldTimer=350; }
        else { game.speedActive=true; game.speedTimer=300; }
      }
    }
    game.powerups = game.powerups.filter(p=>p.x>-50 && !p.collected);

    if(game.shieldActive){ game.shieldTimer--; if(game.shieldTimer<=0) game.shieldActive=false; }
    if(game.speedActive){
      game.speedTimer--; game.speed = game.baseSpeed*1.45;
      if(game.speedTimer<=0) game.speedActive=false;
    } else game.speed = game.baseSpeed;

    for(const pt of game.particles) pt.update();
    game.particles = game.particles.filter(p=>p.alive);

    if(quality.dust && !game.player.isJumping && !game.player.isDucking){
      spawnDust(game.particles, game.player.x+8, GROUND_Y-4, quality.particleMult);
    }
  }

  if(game && game.raining){
    for(let i=0;i<Math.min(quality.rainCount, rainDrops.length);i++) rainDrops[i].update();
  }
}

function rectsCollide(a,b){
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}

// ================= CHIZISH =================
function draw(){
  const quality = QUALITY[graphicsQuality];
  ctx.clearRect(0,0,VW,VH);
  ctx.save();

  let offsetX=0, offsetY=0;
  if(game.shakeMag > 0){
    offsetX = randInt(-game.shakeMag, game.shakeMag);
    offsetY = randInt(-game.shakeMag, game.shakeMag);
    game.shakeMag = Math.max(0, game.shakeMag-1);
  }
  ctx.translate(offsetX, offsetY);

  const dayT = (Math.sin(game.dayTimer*0.001)+1)*0.5;
  ctx.drawImage(sky_day, 0, 0);
  ctx.globalAlpha = (1-dayT);
  ctx.drawImage(sky_night, 0, 0);
  ctx.globalAlpha = 1;

  if(dayT < 0.5){
    const starAlpha = Math.max(0, Math.min(1, (1-(dayT*2))));
    for(let i=0;i<Math.min(quality.stars, starPositions.length);i++){
      const [sx,sy] = starPositions[i];
      const sSize = (i%3===0) ? 3 : 2;
      const pulse = 150 + 105*Math.sin((frameCount+i*15)*0.08);
      ctx.globalAlpha = starAlpha * (pulse/255);
      circle(sx, sy, sSize, COLORS.white);
      ctx.globalAlpha = 1;
    }
  }

  if(game.raining){
    for(let i=0;i<Math.floor(quality.rainCount/2);i++) rainDrops[i].draw();
  }

  for(let i=0;i<trees.length;i++){
    if(i%2===0 && quality.treesSkip===2) continue;
    trees[i].draw();
  }

  drawGround(game.groundOffset);

  if(game.raining){
    for(let i=Math.floor(quality.rainCount/2); i<quality.rainCount; i++) if(rainDrops[i]) rainDrops[i].draw();
  }

  for(const obs of game.obstacles) obs.draw();
  for(const coin of game.coins) coin.draw();
  for(const ball of game.balls) ball.draw();
  for(const p of game.powerups) p.draw();
  for(const pt of game.particles) pt.draw();

  game.player.draw(game.invulnTimer>0, frameCount);

  if(game.shieldActive){
    const px = game.player.x+game.player.width/2, py=game.player.y+game.player.height/2;
    const shR = Math.max(game.player.width, game.player.height)/2+10;
    ctx.globalAlpha = (90+30*Math.sin(frameCount*0.15))/255;
    strokeCircle(px, py, shR, 3, COLORS.blue);
    ctx.globalAlpha = 1;
  }
  if(game.speedActive){
    for(let i=1;i<4;i++){
      ctx.globalAlpha = Math.max(0, 80-i*20)/255;
      rect(game.player.x-i*14, game.player.y, game.player.width, game.player.height, COLORS.pink);
    }
    ctx.globalAlpha = 1;
  }

  // ---- UI ----
  if(state === 'playing'){
    textLeft('Ball: '+game.score, 15, 82, 26, COLORS.white);
    textLeft('Tanga: '+game.coinCount, 15, 117, 26, COLORS.gold);
    for(let i=0;i<3;i++) drawHeart(180+i*35, 83, 26, i<game.lives);

    roundRect(jumpBtn.x, jumpBtn.y, jumpBtn.w, jumpBtn.h, 12, 'rgba(255,255,255,0.12)');
    strokeRoundRect(jumpBtn.x, jumpBtn.y, jumpBtn.w, jumpBtn.h, 12, 2, 'rgba(255,255,255,0.3)');
    textCtr('SAKRACH', jumpBtn.x+jumpBtn.w/2, jumpBtn.y+jumpBtn.h/2, 22, COLORS.white);

    roundRect(duckBtn.x, duckBtn.y, duckBtn.w, duckBtn.h, 12, 'rgba(255,255,255,0.12)');
    strokeRoundRect(duckBtn.x, duckBtn.y, duckBtn.w, duckBtn.h, 12, 2, 'rgba(255,255,255,0.3)');
    textCtr('EGILISH', duckBtn.x+duckBtn.w/2, duckBtn.y+duckBtn.h/2, 22, COLORS.white);

    roundRect(pauseBtn.x, pauseBtn.y, pauseBtn.w, pauseBtn.h, 8, 'rgba(60,60,60,0.7)');
    strokeRoundRect(pauseBtn.x, pauseBtn.y, pauseBtn.w, pauseBtn.h, 8, 2, COLORS.white);
    textCtr('||', pauseBtn.x+pauseBtn.w/2, pauseBtn.y+pauseBtn.h/2, 20, COLORS.white);

    if(game.levelMsgTimer > 0){
      game.levelMsgTimer--;
      textCtr('LEVEL '+game.level, VW/2, 110, 48, COLORS.yellow);
    }
  } else if(state === 'menu'){
    ctx.drawImage(sky_day, 0, 0);
    textCtr('CR7 JUNGLE RUN', VW/2, 90, 48, COLORS.yellow);
    textCtr(`Rekord: ${highScore}   Jami tanga: ${totalCoins}`, VW/2, 160, 26, COLORS.white);
    drawButton(startBtn, 'BOSHLASH', COLORS.green, COLORS.white);
    drawButton(menuSettingsBtn, 'SOZLAMALAR', COLORS.blue, COLORS.white);
  } else if(state === 'paused'){
    ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(0,0,VW,VH);
    textCtr("O'YIN TO'XTATILDI", VW/2, 100, 40, COLORS.white);
    drawButton(resumeBtn, 'DAVOM ETISH', COLORS.green, COLORS.white);
    drawButton(restartBtn, 'QAYTA BOSHLASH', COLORS.orange, COLORS.white);
    drawButton(pauseSettingsBtn, 'SOZLAMALAR', COLORS.blue, COLORS.white);
    drawButton(pauseMenuBtn, 'CHIQISH (MENU)', COLORS.red, COLORS.white);
  } else if(state === 'settings'){
    rect(0,0,VW,VH, COLORS.darkGray);
    textCtr('SOZLAMALAR', VW/2, 60, 40, COLORS.white);
    const sStatus = Sound.soundOn ? 'YONIQ' : "O'CHIQ";
    const mStatus = Sound.musicOn ? 'YONIQ' : "O'CHIQ";
    const gStatus = graphicsQuality==='high' ? 'YUQORI' : 'PAST';
    drawButton(soundToggleBtn, 'OVOZ: '+sStatus, COLORS.blue, COLORS.white);
    drawButton(musicToggleBtn, 'MUSIQA: '+mStatus, COLORS.blue, COLORS.white);
    drawButton(graphicsToggleBtn, 'GRAFIKA: '+gStatus, COLORS.blue, COLORS.white);
    drawButton(backBtn, 'ORQAGA', COLORS.red, COLORS.white);
  } else if(state === 'gameover'){
    ctx.fillStyle='rgba(0,0,0,0.75)'; ctx.fillRect(0,0,VW,VH);
    textCtr("O'YIN TUGADI", VW/2, VH/2-70, 44, COLORS.red);
    textCtr(`Ball: ${game.score}   Tanga: ${game.coinCount}   Rekord: ${highScore}`, VW/2, VH/2-20, 24, COLORS.white);
    drawButton(gameoverRestartBtn, "QAYTA O'YNASH", COLORS.green, COLORS.white);
  }

  ctx.restore();
}

// ================= ASOSIY SIKL =================
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

init();
})();
</script>
